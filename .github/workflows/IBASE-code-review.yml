name: AI PR Review Agent

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    name: PR Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PR review agent
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'openai/agent-strong' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m src.main --event "$GITHUB_EVENT_PATH" --output pr-review.md

      - name: Post review on pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr-review.md

      - name: Job summary
        run: |
          {
            echo "## AI PR Review"
            echo ""
            echo "**PR:** [#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
            echo ""
            cat pr-review.md
          } >> "$GITHUB_STEP_SUMMARY"
