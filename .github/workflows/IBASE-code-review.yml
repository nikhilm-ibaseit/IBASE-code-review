name: AI PR Review Agent

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

# Required so the script can post a review back to the PR
permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    name: PR Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Standard GitHub environment variables ──────────────────────────
      - name: Print GitHub environment variables
        run: |
          echo "============================================================"
          echo "  GITHUB ENVIRONMENT VARIABLES"
          echo "============================================================"
          echo "GITHUB_EVENT_NAME   : $GITHUB_EVENT_NAME"
          echo "GITHUB_REPOSITORY   : $GITHUB_REPOSITORY"
          echo "GITHUB_ACTOR        : $GITHUB_ACTOR"
          echo "GITHUB_SHA          : $GITHUB_SHA"
          echo "GITHUB_REF          : $GITHUB_REF"
          echo "GITHUB_HEAD_REF     : $GITHUB_HEAD_REF"
          echo "GITHUB_BASE_REF     : $GITHUB_BASE_REF"
          echo "GITHUB_RUN_ID       : $GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER   : $GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW     : $GITHUB_WORKFLOW"
          echo "GITHUB_JOB          : $GITHUB_JOB"
          echo "GITHUB_WORKSPACE    : $GITHUB_WORKSPACE"
          echo "============================================================"

      # ── 2. PR details from the event JSON ────────────────────────────────
      - name: Extract PR details from event payload
        id: pr_details
        run: |
          EVENT_PATH="$GITHUB_EVENT_PATH"
          echo "Event payload path: $EVENT_PATH"
          echo ""

          PR_NUMBER=$(jq -r '.pull_request.number'                    "$EVENT_PATH")
          PR_TITLE=$(jq -r '.pull_request.title'                      "$EVENT_PATH")
          PR_BODY=$(jq -r '.pull_request.body // "(no description)"'  "$EVENT_PATH")
          PR_AUTHOR=$(jq -r '.pull_request.user.login'                "$EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url'                     "$EVENT_PATH")
          PR_STATE=$(jq -r '.pull_request.state'                      "$EVENT_PATH")
          PR_DRAFT=$(jq -r '.pull_request.draft'                      "$EVENT_PATH")
          PR_MERGEABLE=$(jq -r '.pull_request.mergeable // "unknown"' "$EVENT_PATH")
          PR_BASE_BRANCH=$(jq -r '.pull_request.base.ref'             "$EVENT_PATH")
          PR_HEAD_BRANCH=$(jq -r '.pull_request.head.ref'             "$EVENT_PATH")
          PR_BASE_SHA=$(jq -r '.pull_request.base.sha'                "$EVENT_PATH")
          PR_HEAD_SHA=$(jq -r '.pull_request.head.sha'                "$EVENT_PATH")
          PR_COMMITS=$(jq -r '.pull_request.commits'                  "$EVENT_PATH")
          PR_ADDITIONS=$(jq -r '.pull_request.additions'              "$EVENT_PATH")
          PR_DELETIONS=$(jq -r '.pull_request.deletions'              "$EVENT_PATH")
          PR_CHANGED_FILES=$(jq -r '.pull_request.changed_files'      "$EVENT_PATH")
          PR_CREATED_AT=$(jq -r '.pull_request.created_at'            "$EVENT_PATH")
          PR_UPDATED_AT=$(jq -r '.pull_request.updated_at'            "$EVENT_PATH")
          PR_LABELS=$(jq -r '[.pull_request.labels[].name] | join(", ") | if . == "" then "(none)" else . end' "$EVENT_PATH")
          PR_REQUESTED_REVIEWERS=$(jq -r '[.pull_request.requested_reviewers[].login] | join(", ") | if . == "" then "(none)" else . end' "$EVENT_PATH")
          ACTION=$(jq -r '.action'                                     "$EVENT_PATH")

          echo "============================================================"
          echo "  PULL REQUEST DETAILS"
          echo "============================================================"
          echo "Action              : $ACTION"
          echo "PR Number           : #$PR_NUMBER"
          echo "Title               : $PR_TITLE"
          echo "Author              : $PR_AUTHOR"
          echo "URL                 : $PR_URL"
          echo "State               : $PR_STATE"
          echo "Draft               : $PR_DRAFT"
          echo "Mergeable           : $PR_MERGEABLE"
          echo "Base Branch         : $PR_BASE_BRANCH  ($PR_BASE_SHA)"
          echo "Head Branch         : $PR_HEAD_BRANCH  ($PR_HEAD_SHA)"
          echo "Commits             : $PR_COMMITS"
          echo "Files Changed       : $PR_CHANGED_FILES"
          echo "Additions (+)       : $PR_ADDITIONS"
          echo "Deletions (-)       : $PR_DELETIONS"
          echo "Labels              : $PR_LABELS"
          echo "Requested Reviewers : $PR_REQUESTED_REVIEWERS"
          echo "Created At          : $PR_CREATED_AT"
          echo "Updated At          : $PR_UPDATED_AT"
          echo "------------------------------------------------------------"
          echo "Description:"
          echo "$PR_BODY"
          echo "============================================================"

          echo "pr_number=$PR_NUMBER"               >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE"                 >> "$GITHUB_OUTPUT"
          echo "pr_author=$PR_AUTHOR"               >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=$PR_BASE_BRANCH"     >> "$GITHUB_OUTPUT"
          echo "pr_head_branch=$PR_HEAD_BRANCH"     >> "$GITHUB_OUTPUT"
          echo "pr_base_sha=$PR_BASE_SHA"           >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=$PR_HEAD_SHA"           >> "$GITHUB_OUTPUT"
          echo "pr_additions=$PR_ADDITIONS"         >> "$GITHUB_OUTPUT"
          echo "pr_deletions=$PR_DELETIONS"         >> "$GITHUB_OUTPUT"
          echo "pr_changed_files=$PR_CHANGED_FILES" >> "$GITHUB_OUTPUT"

      # ── 3. Changed files diff stat ────────────────────────────────────────
      - name: List changed files
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr-review.md

      # ── 4. Set up Python for the AI review script ─────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 5. Run AI review and post result back to the PR ───────────────────
      - name: Run AI code review
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_review.py

      # ── 6. Summary card in the Actions UI ────────────────────────────────
      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## PR Review Agent — Completed

          | Field | Value |
          |---|---|
          | PR | [#${{ steps.pr_details.outputs.pr_number }} ${{ steps.pr_details.outputs.pr_title }}](${{ github.event.pull_request.html_url }}) |
          | Author | \`${{ steps.pr_details.outputs.pr_author }}\` |
          | Branch | \`${{ steps.pr_details.outputs.pr_head_branch }}\` → \`${{ steps.pr_details.outputs.pr_base_branch }}\` |
          | Changes | +${{ steps.pr_details.outputs.pr_additions }} / -${{ steps.pr_details.outputs.pr_deletions }} across ${{ steps.pr_details.outputs.pr_changed_files }} file(s) |
          | Run | [$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) |

          > AI review posted as a comment on the PR.
          EOF
